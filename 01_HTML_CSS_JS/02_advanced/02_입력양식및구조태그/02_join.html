<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      fieldset {
        border: 1px solid black; 
      }

      form {
        font-weight: bold;
      }

      
    </style>
  </head>
  <body>
    <!--
    form 태그 : 사용자로부터 입력을 받기 위한 양식을 만드는 태그(여러개를 한꺼번에 받을 수 있음)
    action : 폼 데이터를 전송할 서버의 URL
    method : 데이터 전송 방식 ( GET / POST )
    -->
    <form action="https://www.naver.com" method="get">
      <fieldset style="width: 350px">
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userid">사용자ID</label></td>
            <!--
          input 태그
          name : 서버로 전송될 때 사용되는 이름
          id : html 요소의 고유 식별자
          type : 입력필드의 종류-->
            <td><input id="userid" name="userid" type="text" /></td>
          </tr>
          <tr>
            <td><label for="pw">비밀번호</label></td>
            <td><input id="pw" name="pw" type="password" /></td>
          </tr>
          <tr>
            <td><label for="pw_re">비밀번호확인</label></td>
            <td><input id="pw_re" name="pw_re" type="password" /></td>
          </tr>
          <tr>
            <td><label for="username">이름</label></td>
            <td><input id="username" name="username" type="text" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <!---->
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남자</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여자</label>
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <!---->
              <input id="soccer" type="checkbox" name="hobby" value="soccer" />
              <label for="soccer">축구</label>
              <input
                id="baseball"
                type="checkbox"
                name="hobby"
                value="baseball"
              />
              <label for="baseball">야구</label>
              <input id="baegu" type="checkbox" name="hobby" value="baegu" />
              <label for="baegu">배구</label>
              <input
                id="basketball"
                type="checkbox"
                name="hobby"
                value="basketball"
              />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <td><label for="email">email</label></td>
            <td><input id="email" name="email" type="text" /></td>
          </tr>
          <tr>
            <td><label for="role">역할</label></td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>

        <div style="margin-top: 10px">
          <input type="submit" value="확인" />
          <input type="reset" value="다시쓰기" />
        </div>
      </fieldset>
    </form>
  </body>
</html>
