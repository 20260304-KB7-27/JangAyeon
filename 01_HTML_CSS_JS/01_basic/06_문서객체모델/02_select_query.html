<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
  </head>
  <script>
    //window.onload
    // 웹 페이지의 모든 콘텐츠 (HTML, CSS, Image)가 로드된 이후에 실행되는 이벤트 핸들러
    window.onload = function () {
      //  querySelector
      // 주어진 CSS 선택지에 일치하는 첫번재 요소를 선택한다.
      let header = document.querySelector('h1'); //요소선택

      header.style.color = 'orange';
      header.style.backgroundColor = 'red';
      //header.innerText = 'From JavaScript';
      header.innerHTML = 'From JavaScript';

      let header2 = document.querySelector('.classtest');
      header2.style.color = 'red';

      let header3 = document.querySelector('#idtest');
      header3.style.color = 'blue';
    };
  </script>
  <body>
    <h1>Header</h1>
    <h1 class="classtest">Header</h1>
    <h1 id="idtest">Header</h1>
  </body>
</html>
