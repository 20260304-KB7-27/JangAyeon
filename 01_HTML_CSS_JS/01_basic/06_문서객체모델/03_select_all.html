<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
  </head>
  <script>
    //window.onload
    // 웹 페이지의 모든 콘텐츠 (HTML, CSS, Image)가 로드된 이후에 실행되는 이벤트 핸들러
    window.onload = function () {
      // querySelectorAll
      // 주어진 CSS 선택지에 일치하는 모든 요소를 선택 (Nodelist로 반환)
      let headers = document.querySelectorAll('h1'); //요소선택

      for (let i = 0; i < headers.length; i++) {
        let header = headers[i];
        header.style.color = 'orange';
        header.style.backgroundColor = 'red';
        //header.innerText = 'From JavaScript';
        header.innerHTML = 'From JavaScript';
      }
    };
  </script>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
